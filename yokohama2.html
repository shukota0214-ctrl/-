<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案内図：横浜市 観光スポット</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Hiragino Mincho ProN","Yu Mincho",serif; background:#1a1a2e; }

.page-wrap {
  width:210mm; min-height:297mm; margin:20px auto;
  background:#faf8f2;
  box-shadow:0 4px 32px rgba(0,0,0,0.35);
  display:flex; flex-direction:column;
  padding:10mm 10mm 10mm 10mm;
}

.header {
  text-align:center;
  border-bottom:2.5px solid #1a1a2e;
  padding-bottom:6px; margin-bottom:8px;
}
.header h1 { font-size:18px; letter-spacing:5px; color:#1a1a2e; }
.header p  { font-size:10px; color:#555; margin-top:3px; letter-spacing:2px; }

.map-container { position:relative; width:100%; height:190mm; }
#map { width:100%; height:100%; border:1.5px solid #666; }
#anno-canvas {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; z-index:450;
}

/* ポップアップ */
.leaflet-popup-content-wrapper {
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  border-radius:4px;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.leaflet-popup-content { font-size:12px; line-height:1.6; margin:8px 12px; }
.popup-title { font-size:13px; font-weight:bold; border-bottom:1px solid #ccc; padding-bottom:3px; margin-bottom:4px; }
.popup-cat { font-size:10px; color:#888; margin-bottom:2px; }

/* カスタムラベル */
.spot-label {
  background:transparent;
  border:none;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:11px;
  font-weight:bold;
  white-space:nowrap;
  text-shadow:1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
  pointer-events:none;
}

/* 凡例 */
.legend-box {
  margin-top:7px; border:1.2px solid #aaa;
  padding:6px 12px; background:#fdfcf7;
  display:flex; gap:16px; flex-wrap:wrap;
}
.leg-title { font-size:10px; font-weight:bold; margin-bottom:4px; border-bottom:1px solid #ddd; padding-bottom:2px; color:#1a1a2e; }
.leg-row { display:flex; align-items:center; gap:6px; font-size:9px; margin-bottom:3px; }

.note { margin-top:6px; font-size:8.5px; color:#555; line-height:1.7; border-left:3px solid #999; padding-left:8px; }
.footer-line { margin-top:7px; font-size:9px; color:#888; border-top:1px solid #ddd; padding-top:5px; display:flex; justify-content:space-between; }

@media print { body{background:white;} .page-wrap{margin:0;box-shadow:none;} }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="header">
    <h1>案　内　図</h1>
    <p>横浜市　観光スポットガイド</p>
  </div>

  <div class="map-container">
    <div id="map"></div>
    <canvas id="anno-canvas"></canvas>
  </div>

  <div class="legend-box">
    <div style="flex:1.2">
      <div class="leg-title">カテゴリー</div>
      <div class="leg-row"><svg width="16" height="16"><circle cx="8" cy="8" r="7" fill="#c0392b" stroke="white" stroke-width="1.5"/><text x="8" y="12" text-anchor="middle" font-size="10" fill="white">★</text></svg><span>歴史・文化</span></div>
      <div class="leg-row"><svg width="16" height="16"><circle cx="8" cy="8" r="7" fill="#1a5276" stroke="white" stroke-width="1.5"/><text x="8" y="12" text-anchor="middle" font-size="10" fill="white">♦</text></svg><span>自然・公園</span></div>
      <div class="leg-row"><svg width="16" height="16"><circle cx="8" cy="8" r="7" fill="#1e8449" stroke="white" stroke-width="1.5"/><text x="8" y="12" text-anchor="middle" font-size="10" fill="white">●</text></svg><span>商業・食・街</span></div>
      <div class="leg-row"><svg width="16" height="16"><circle cx="8" cy="8" r="7" fill="#7d3c98" stroke="white" stroke-width="1.5"/><text x="8" y="12" text-anchor="middle" font-size="10" fill="white">■</text></svg><span>港・観光施設</span></div>
      <div class="leg-row"><svg width="16" height="16"><circle cx="8" cy="8" r="7" fill="#d35400" stroke="white" stroke-width="1.5"/><text x="8" y="12" text-anchor="middle" font-size="10" fill="white">▲</text></svg><span>駅・交通拠点</span></div>
    </div>
    <div style="flex:2">
      <div class="leg-title">主要スポット一覧</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1px 16px; font-size:9px; line-height:1.8;">
        <span>❶ 横浜駅</span><span>❼ 山下公園</span>
        <span>❷ みなとみらい21</span><span>❽ 横浜中華街</span>
        <span>❸ 横浜ランドマークタワー</span><span>❾ 元町ショッピングストリート</span>
        <span>❹ 赤レンガ倉庫</span><span>❿ 三渓園</span>
        <span>❺ 横浜マリンタワー</span><span>⓫ 横浜外国人墓地</span>
        <span>❻ 港の見える丘公園</span><span>⓬ 野毛山動物園</span>
      </div>
    </div>
  </div>

  <div class="note">
    ※ 掲載スポットは代表的な観光地を抜粋したものです。営業時間・入場料等は各施設にご確認ください。<br>
    ※ 地図タイル：国土地理院（地理院タイル）を使用
  </div>
  <div class="footer-line">
    <span>案内図　横浜市観光スポット</span>
    <span>作成日：＿＿年＿＿月＿＿日</span>
  </div>
</div>

<script>
const map = L.map('map', {
  center: [35.445, 139.638],
  zoom: 14,
  zoomControl: true,
  attributionControl: true
});
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
  maxZoom: 18
}).addTo(map);

// カテゴリ色
const CAT = {
  history:  { color:'#c0392b', label:'歴史・文化' },
  nature:   { color:'#1a5276', label:'自然・公園' },
  commerce: { color:'#1e8449', label:'商業・食・街' },
  port:     { color:'#7d3c98', label:'港・観光施設' },
  station:  { color:'#d35400', label:'駅・交通拠点' },
};

// スポットデータ
const spots = [
  { num:'❶', name:'横浜駅',                  lat:35.4658, lng:139.6225, cat:'station',  desc:'JR・私鉄・地下鉄が集まる横浜最大のターミナル駅。周辺にショッピングモールが充実。' },
  { num:'❷', name:'みなとみらい21',           lat:35.4574, lng:139.6380, cat:'port',     desc:'横浜港沿いの大規模複合都市開発エリア。オフィス・商業・ホテルが集積。' },
  { num:'❸', name:'横浜ランドマークタワー',   lat:35.4556, lng:139.6318, cat:'port',     desc:'地上70階・高さ296mの超高層ビル。展望フロア「スカイガーデン」から絶景を一望。' },
  { num:'❹', name:'赤レンガ倉庫',             lat:35.4516, lng:139.6437, cat:'history',  desc:'明治・大正期に建設された歴史的建造物。現在はイベントホール・ショップとして活用。' },
  { num:'❺', name:'横浜マリンタワー',         lat:35.4436, lng:139.6484, cat:'port',     desc:'高さ106mの展望タワー。山下公園に隣接し港の景観を楽しめる。' },
  { num:'❻', name:'港の見える丘公園',         lat:35.4461, lng:139.6530, cat:'nature',   desc:'横浜港を一望できる高台の公園。バラ園や西洋館が点在する絶景スポット。' },
  { num:'❼', name:'山下公園',                 lat:35.4413, lng:139.6467, cat:'nature',   desc:'横浜港に面した全長約700mの海浜公園。氷川丸が永久係留されている。' },
  { num:'❽', name:'横浜中華街',               lat:35.4434, lng:139.6474, cat:'commerce', desc:'日本最大の中華街。約600店舗が集まり食・雑貨・文化を体験できる。' },
  { num:'❾', name:'元町ショッピングストリート', lat:35.4428, lng:139.6520, cat:'commerce', desc:'老舗ブランド・ファッション店が並ぶ横浜を代表するショッピング街。' },
  { num:'❿', name:'三渓園',                   lat:35.4167, lng:139.6588, cat:'history',  desc:'明治期の実業家が造営した日本庭園。重要文化財の古建築が17棟点在。' },
  { num:'⓫', name:'横浜外国人墓地',           lat:35.4472, lng:139.6546, cat:'history',  desc:'幕末から続く外国人専用の墓地。山手の歴史を伝える文化財的存在。' },
  { num:'⓬', name:'野毛山動物園',             lat:35.4470, lng:139.6294, cat:'nature',   desc:'入園無料の市立動物園。ライオン・キリンなど約100種の動物を飼育。' },
];

// アイコン生成
function makeSpotIcon(cat, num) {
  const color = CAT[cat].color;
  return L.divIcon({
    className: '',
    html: `<div style="
      position:relative;
      width:28px; height:28px;
      background:${color};
      border:2.5px solid white;
      border-radius:50%;
      box-shadow:0 2px 6px rgba(0,0,0,0.45);
      display:flex; align-items:center; justify-content:center;
      font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
      font-size:11px; font-weight:bold; color:white;
      line-height:1;
    ">${num}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -16],
  });
}

spots.forEach(function(s) {
  const color = CAT[s.cat].color;
  const marker = L.marker([s.lat, s.lng], { icon: makeSpotIcon(s.cat, s.num) });
  marker.bindPopup(`
    <div class="popup-title" style="color:${color}">${s.num} ${s.name}</div>
    <div class="popup-cat">${CAT[s.cat].label}</div>
    <div>${s.desc}</div>
  `, { maxWidth: 220 });

  // 名称ラベル（マーカーの右側）
  marker.bindTooltip(`<span style="color:${color};font-weight:bold;">${s.name}</span>`, {
    permanent: true,
    direction: 'right',
    className: 'spot-label',
    offset: [6, 0],
  });

  marker.addTo(map);
});

// ===== Leaflet L.circle でエリア囲み（ズーム連動） =====
// radiusはメートル単位 → ズームしても地理的に正しいサイズで描画される

function addAreaCircle(lat, lng, radiusM, color, label) {
  const circle = L.circle([lat, lng], {
    radius: radiusM,
    color: color,
    weight: 2,
    opacity: 0.6,
    fillColor: color,
    fillOpacity: 0.06,
    dashArray: '7, 5',
  }).addTo(map);

  // ラベルは円の北端付近にtooltipで表示
  const labelLat = lat + (radiusM / 111320); // 緯度方向にradiusM分ずらす
  L.marker([labelLat, lng], {
    icon: L.divIcon({
      className: '',
      html: `<div style="
        font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
        font-size:11px; font-weight:bold;
        color:${color};
        white-space:nowrap;
        text-shadow:1px 1px 0 white,-1px -1px 0 white,1px -1px 0 white,-1px 1px 0 white;
        pointer-events:none;
      ">${label}</div>`,
      iconAnchor: [0, 16],
    }),
    interactive: false,
  }).addTo(map);
}

// エリア間の補助線（L.polyline で破線）
function addRouteLine(from, to) {
  L.polyline([from, to], {
    color: '#999',
    weight: 1.5,
    opacity: 0.45,
    dashArray: '4, 6',
  }).addTo(map);
}

// エリア囲み（半径はメートル）
addAreaCircle(35.456,  139.629, 700, '#7d3c98', 'みなとみらいエリア');
addAreaCircle(35.4415, 139.648, 700, '#c0392b', '山下・中華街エリア');
addAreaCircle(35.446,  139.653, 420, '#1a5276', '元町・山手エリア');

// エリア間補助線
addRouteLine([35.456, 139.629], [35.4415, 139.648]);
addRouteLine([35.4415, 139.648], [35.446, 139.653]);
</script>
</body>
</html>
